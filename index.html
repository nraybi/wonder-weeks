    function buildWeekMap() {
      const map = {};
      for (let w = 0; w <= 84; w++) map[w] = { status:"sunny", leap:null };
      for (const leap of LEAPS) {
        if (leap.isGrey) {
          for (let w = leap.restlessStart; w <= leap.restlessEnd; w++) map[w] = { status:"grey", leap };
        } else {
          for (let w = leap.restlessStart; w <= leap.restlessEnd; w++)
            if (map[w].status === "sunny") map[w] = { status:"restless", leap };
          if (leap.peakStart !== null)
            for (let w = leap.peakStart; w <= leap.peakEnd; w++) map[w] = { status:"fussy", leap };
          if (leap.skillsStart !== null)
            for (let w = leap.skillsStart; w <= leap.skillsEnd; w++) map[w] = { status:"skills", leap };
        }
      }
      return map;
    }

    function Stars({isDark}){
      if(isDark){
        return <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:0}}>{STARS.map((s,i)=><div key={i} style={{position:"absolute",left:`${s.x}%`,top:`${s.y}%`,width:s.sz,height:s.sz,borderRadius:"50%",background:"white",opacity:s.o,animation:`twinkle ${s.d}s ease-in-out infinite alternate`,animationDelay:`${i*.09}s`}}/>)}</div>;
      }
      // Light mode: soft pastel blob shapes
      const blobs=[
        {x:-10,y:-5,w:340,h:300,c:"rgba(196,181,253,.35)"},
        {x:55,y:5,w:280,h:260,c:"rgba(147,197,253,.3)"},
        {x:-5,y:45,w:220,h:200,c:"rgba(252,211,77,.2)"},
        {x:60,y:55,w:300,h:280,c:"rgba(167,243,208,.25)"},
        {x:20,y:80,w:350,h:300,c:"rgba(251,207,232,.3)"},
      ];
      return <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:0,overflow:"hidden"}}>
        {blobs.map((b,i)=><div key={i} style={{position:"absolute",left:`${b.x}%`,top:`${b.y}%`,width:b.w,height:b.h,borderRadius:"50%",background:b.c,filter:"blur(60px)",animation:`twinkle ${4+i}s ease-in-out infinite alternate`,animationDelay:`${i*.7}s`}}/>)}
      </div>;
    }

    function Timeline({cur,disp,onClick}){
      return <div style={{display:"flex",gap:"2px",alignItems:"flex-end",overflowX:"auto",scrollbarWidth:"none",padding:"4px 0",cursor:"pointer"}}>{Array.from({length:85},(_,w)=>{const wd=WEEK_MAP[w],isD=w===disp,isC=w===cur;return <div key={w} onClick={()=>onClick(w)} title={`שבוע ${w}`} style={{width:isD?7:isC?5:3,height:isD?30:isC?24:wd.leap?18:10,borderRadius:3,flexShrink:0,background:isD?"#6366f1":isC?"#94a3b8":(BARCOL[wd.status]||"#cbd5e6"),opacity:w<cur&&!isC&&!isD?.35:1,transition:"all 0.12s"}}/>})}</div>;
    }

    function ProgressBar({wn,leap,status}){
      if(!leap||!leap.peakStart)return null;
      const start=leap.restlessStart,end=leap.skillsEnd??leap.restlessEnd;
      const pct=Math.max(0,Math.min(100,((wn-start)/(end-start))*100));
      const daysLeft=(end-wn)*7;
      const c=CFG[status];
      return <div style={{marginBottom:11}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:5,fontSize:11,color:c.text,opacity:.65}}>
          <span>התקדמות בקפיצה</span>
          <span>{daysLeft>0?`עוד ~${daysLeft} ימים`:"הקפיצה הסתיימה"}</span>
        </div>
        <div style={{background:"rgba(0,0,0,.1)",borderRadius:20,height:6,overflow:"hidden"}}>
          <div style={{width:`${pct}%`,height:"100%",borderRadius:20,background:`linear-gradient(90deg,${c.accent}88,${c.accent})`,transition:"width .4s ease"}}/>
        </div>
      </div>;
    }

    function DetailSection({leap,status}){
      const [open,setOpen]=useState(false);
      if(!leap||(!leap.sleep&&!leap.feeding&&!leap.activities))return null;
      const c=CFG[status];
      return <div style={{marginTop:8}}>
        <button onClick={()=>setOpen(o=>!o)} style={{width:"100%",padding:"9px 12px",border:`1px solid ${c.accent}44`,borderRadius:11,background:`${c.accent}12`,color:c.text,fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span>📖 טיפים מורחבים לשינה, תזונה ופעילויות</span>
          <span style={{transition:"transform .2s",display:"inline-block",transform:open?"rotate(180deg)":"rotate(0deg)"}}>▾</span>
        </button>
        {open&&<div style={{marginTop:8,display:"flex",flexDirection:"column",gap:8}}>
          {leap.sleep&&<div style={{background:"rgba(99,102,241,.1)",borderRadius:11,padding:"10px 13px"}}><div style={{fontSize:11,fontWeight:800,color:c.text,marginBottom:4}}>🌙 שינה והרגעה</div><div style={{fontSize:12.5,color:c.text,opacity:.85,lineHeight:1.55}}>{leap.sleep}</div></div>}
          {leap.feeding&&<div style={{background:"rgba(16,185,129,.1)",borderRadius:11,padding:"10px 13px"}}><div style={{fontSize:11,fontWeight:800,color:c.text,marginBottom:4}}>🍼 תזונה והנקה</div><div style={{fontSize:12.5,color:c.text,opacity:.85,lineHeight:1.55}}>{leap.feeding}</div></div>}
          {leap.activities&&<div style={{background:"rgba(251,146,60,.1)",borderRadius:11,padding:"10px 13px"}}><div style={{fontSize:11,fontWeight:800,color:c.text,marginBottom:4}}>🧸 פעילויות מומלצות</div><div style={{fontSize:12.5,color:c.text,opacity:.85,lineHeight:1.55}}>{leap.activities}</div></div>}
        </div>}
      </div>;
    }

    function Card({weekNum,isPast,isCurrent}){
      const wn=Math.max(0,Math.min(84,weekNum));
      const {status,leap}=WEEK_MAP[wn];
      const c=CFG[status];
      return <div style={{background:`linear-gradient(135deg,${c.g1},${c.g2})`,borderRadius:24,padding:22,border:`2px solid ${isCurrent?c.accent:"rgba(255,255,255,0.12)"}`,boxShadow:isCurrent?`0 12px 40px ${c.accent}44,0 2px 8px rgba(0,0,0,.1)`:"0 4px 20px rgba(0,0,0,.08)",opacity:isPast?.58:1,position:"relative",overflow:"hidden",transform:isCurrent?"scale(1.01)":"scale(1)",transition:"all .3s"}}>
        <div style={{position:"absolute",top:-28,left:-28,width:120,height:120,borderRadius:"50%",background:`${c.accent}15`,pointerEvents:"none"}}/>
        {isCurrent&&<div style={{position:"absolute",top:13,right:13,background:c.accent,color:"#fff",fontSize:10,fontWeight:800,padding:"3px 10px",borderRadius:20}}>עכשיו</div>}
        {isPast&&<div style={{position:"absolute",top:13,right:13,background:"rgba(0,0,0,.13)",color:c.text,fontSize:10,fontWeight:700,padding:"3px 10px",borderRadius:20}}>עבר</div>}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginTop:8,marginBottom:14}}>
          <div>
            <div style={{fontSize:11,color:c.text,opacity:.5,fontWeight:600,marginBottom:2}}>שבוע {wn} מהלידה</div>
            <div style={{fontSize:19,fontWeight:800,color:c.text}}>{c.icon} {c.label}</div>
            <div style={{fontSize:12,color:c.text,opacity:.45,marginTop:2}}>מצב: {c.mood}</div>
          </div>
          <div style={{fontSize:44,lineHeight:1,filter:"drop-shadow(0 2px 4px rgba(0,0,0,.15))"}}>{c.icon}</div>
        </div>
        {leap?<>
          <div style={{background:`${c.accent}20`,borderRadius:13,padding:"9px 13px",marginBottom:11,display:"flex",alignItems:"center",gap:9}}>
            <span style={{fontSize:22}}>{leap.emoji}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:11,color:c.text,opacity:.5,fontWeight:600}}>{leap.isGrey?"תקופה מיוחדת":`קפיצה ${leap.leap} מתוך 10`}</div>
              <div style={{fontSize:15,fontWeight:800,color:c.text}}>{leap.name}</div>
            </div>
            {leap.isBig&&<div style={{background:c.accent,color:"#fff",fontSize:9,fontWeight:800,padding:"2px 7px",borderRadius:10,flexShrink:0}}>★ גדולה</div>}
          </div>
          <ProgressBar wn={wn} leap={leap} status={status}/>
          <p style={{fontSize:13,lineHeight:1.65,color:c.text,margin:"0 0 11px",opacity:.85}}>{leap.description}</p>
          {status==="skills"&&<div style={{background:`${c.accent}18`,borderRadius:11,padding:"9px 12px",marginBottom:9}}><div style={{fontSize:11,fontWeight:800,color:c.text,marginBottom:3}}>🌱 מיומנויות עכשיו</div><div style={{fontSize:12.5,color:c.text,opacity:.8,lineHeight:1.5}}>{leap.skills}</div></div>}
          {status==="restless"&&<div style={{background:"rgba(255,255,255,.4)",borderRadius:11,padding:"9px 12px",marginBottom:9,borderRight:`3px solid ${c.accent}`}}><div style={{fontSize:12.5,color:c.text,opacity:.75,lineHeight:1.5}}>הקפיצה עוד לא הגיעה לשיאה — ייתכן שהתינוק יהיה קצת יותר חסר מנוחה השבוע.</div></div>}
          <div style={{background:"rgba(255,255,255,.6)",borderRadius:11,padding:"9px 12px",marginBottom:8,borderRight:`3px solid ${c.accent}`}}><div style={{fontSize:11,fontWeight:800,color:c.text,marginBottom:3}}>💡 טיפ להורה</div><div style={{fontSize:12.5,color:c.text,opacity:.8,lineHeight:1.5}}>{leap.tip}</div></div>
          <DetailSection leap={leap} status={status}/>
        </>:<div style={{background:"rgba(255,255,255,.5)",borderRadius:13,padding:"13px 15px"}}><p style={{fontSize:13,color:c.text,opacity:.7,margin:0,lineHeight:1.6}}>🌿 תקופה שקטה יחסית. התינוק מתאמן ומשכלל את הכישורים שרכש. משחק חופשי וזמן איכות הם הדבר הכי טוב עכשיו.</p></div>}
      </div>;
    }

    function ShareButton({cur,disp}){
      const {status,leap}=WEEK_MAP[Math.max(0,Math.min(84,disp??0))];
      const doShare=()=>{
        const cfg=CFG[status];
        const leapTxt=leap?`${leap.emoji} ${leap.name}`:"שבוע שקט";
        const text=`אנחנו בשבוע ${disp} – ${cfg.icon} ${cfg.label}!\n${leapTxt}\n\nבדקו מה השבוע אצלכם 👇\nhttps://nraybi.github.io/wonder-weeks/`;
        navigator.share({title:"קפיצות הגדילה",text});
      };
      return <button onClick={doShare} title="שתף" style={{padding:11,background:"rgba(99,102,241,.2)",border:"1px solid rgba(99,102,241,.4)",borderRadius:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .2s"}}>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#a5b4fc" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      </button>;
    }

    function App(){
      const [date,setDate]=useState(()=>localStorage.getItem("ww_date")||"");
      const [ready,setReady]=useState(()=>!!localStorage.getItem("ww_date"));
      const [offset,setOffset]=useState(0);
      const [tab,setTab]=useState("card");
      const [anim,setAnim]=useState(null);
      const [ts,setTs]=useState(null);
      const [ds,setDs]=useState(null);
      const [isDark,setIsDark]=useState(()=>{const dark=localStorage.getItem("ww_theme")!=="light";document.body.style.background=dark?'#0a0f1e':'#faf8f5';return dark;});
      const [installPrompt,setInstallPrompt]=useState(null);
      const [installed,setInstalled]=useState(false);
      React.useEffect(()=>{
        const handler=e=>{e.preventDefault();setInstallPrompt(e);};
        window.addEventListener('beforeinstallprompt',handler);
        window.addEventListener('appinstalled',()=>{setInstalled(true);setInstallPrompt(null);});
        return()=>window.removeEventListener('beforeinstallprompt',handler);
      },[]);
      const doInstall=()=>{if(!installPrompt)return;installPrompt.prompt();installPrompt.userChoice.then(()=>setInstallPrompt(null));};
      const T=isDark?DARK:LIGHT;
      const toggleTheme=()=>setIsDark(d=>{const n=!d;localStorage.setItem("ww_theme",n?"dark":"light");return n;});
      const today=new Date().toISOString().split("T")[0];
      const earliest=new Date(Date.now()-84*7*24*60*60*1000).toISOString().split("T")[0];
      const cur=ready&&date?getWeeks(date):null;
      const disp=cur!==null?Math.max(0,Math.min(84,cur+offset)):null;
      const go=useCallback((dir)=>{if(cur===null)return;setAnim(dir);setTimeout(()=>setAnim(null),280);if(dir===1)setOffset(o=>Math.min(84-cur,o+1));else setOffset(o=>Math.max(-cur,o-1));},[cur]);

      return <div dir="rtl" style={{minHeight:"100vh",background:T.bg,fontFamily:"'Segoe UI',Tahoma,'Arial Hebrew',sans-serif",overflowX:"hidden",transition:"background .3s"}}>
        <style>{`@keyframes twinkle{from{opacity:.06}to{opacity:.65}}@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}@keyframes sl{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}@keyframes sr{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}::-webkit-scrollbar{display:none}input[type=date]{direction:ltr;color-scheme:${T.ds}}button:hover{filter:brightness(1.1)}`}</style>
        <Stars isDark={isDark}/>
        <div style={{position:"relative",zIndex:1,maxWidth:430,margin:"0 auto",padding:"20px 16px 48px",display:"flex",flexDirection:"column",gap:15,animation:"fadeUp .5s ease"}}>

          <div style={{textAlign:"center",padding:"10px 0 2px",position:"relative"}}>
            <button onClick={toggleTheme} style={{position:"absolute",left:0,top:10,background:"none",border:"none",cursor:"pointer",fontSize:20,opacity:.7,padding:4,zIndex:10}}>{isDark?"☀️":"🌙"}</button>
            {installPrompt&&!installed&&<button onClick={doInstall} style={{position:"absolute",right:0,top:10,background:"rgba(99,102,241,.2)",border:"1px solid rgba(99,102,241,.4)",borderRadius:10,cursor:"pointer",padding:"4px 10px",zIndex:10,fontSize:11,fontWeight:700,color:"#a5b4fc",display:"flex",alignItems:"center",gap:4}}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#a5b4fc" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3v13M7 11l5 5 5-5"/><path d="M5 21h14"/></svg>
              התקן אפליקציה
            </button>}
            <div style={{fontSize:46,marginBottom:4,filter:T.glow}}>🌙</div>
            <h1 style={{color:T.h1,fontSize:27,fontWeight:900,margin:0,letterSpacing:"-0.03em",textShadow:T.h1s}}>קפיצות הגדילה</h1>
            <p style={{color:T.sub,fontSize:13,margin:"5px 0 0"}}>Wonder Weeks · מה קורה לתינוק שלך עכשיו</p>
          </div>

          <div style={{background:T.card,backdropFilter:"blur(24px)",borderRadius:22,padding:20,border:`1px solid ${T.cardB}`,boxShadow:"0 8px 32px rgba(0,0,0,.15)"}}>
            <label style={{color:T.sub,fontSize:12,fontWeight:700,display:"block",marginBottom:8,letterSpacing:".05em"}}>📅 תאריך לידה (או מועד לידה משוער)</label>
            <input type="date" value={date} max={today} min={earliest}
              onChange={e=>{const v=e.target.value;setDate(v);setReady(false);setOffset(0);if(v)localStorage.setItem("ww_date",v);else localStorage.removeItem("ww_date");}}
              style={{width:"100%",background:T.inBg,border:`1px solid ${T.inB}`,borderRadius:13,padding:"11px 14px",color:T.inC,fontSize:16,outline:"none",marginBottom:12}}/>
            <div style={{background:T.infoBg,borderRadius:10,padding:"8px 12px",marginBottom:14,fontSize:11,color:T.infoC,lineHeight:1.5}}>
              ⚠️ Wonder Weeks מחשב ממועד הלידה המשוער. אם נולד בדיוק בזמן – ההפרש זניח.
            </div>
            <button onClick={()=>{if(date){localStorage.setItem("ww_date",date);setReady(true);setOffset(0);}}} disabled={!date}
              style={{width:"100%",padding:13,border:"none",borderRadius:14,background:date?"linear-gradient(135deg,#6366f1,#8b5cf6)":"rgba(128,128,128,.2)",color:date?"#fff":T.sub,fontSize:15,fontWeight:800,cursor:date?"pointer":"not-allowed",boxShadow:date?"0 4px 20px rgba(99,102,241,.5)":"none",transition:"all .2s"}}>
              {date?"🔍 מה קורה עכשיו?":"בחר תאריך"}
            </button>
          </div>

          {ready&&cur!==null&&(<>
            <div style={{background:T.tlBg,backdropFilter:"blur(20px)",borderRadius:18,padding:"12px 15px",border:`1px solid ${T.tlB}`}}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{textAlign:"center",flexShrink:0}}><div style={{color:T.sub,fontSize:10,fontWeight:700}}>עכשיו</div><div style={{color:T.text,fontSize:26,fontWeight:900,lineHeight:1}}>{cur}</div></div>
                <div style={{flex:1,overflow:"hidden"}}><Timeline cur={cur} disp={disp} onClick={w=>setOffset(w-cur)}/></div>
                <div style={{textAlign:"center",flexShrink:0}}><div style={{color:T.sub,fontSize:10,fontWeight:700}}>מתוך</div><div style={{color:T.sub,fontSize:26,fontWeight:900,lineHeight:1}}>84</div></div>
              </div>
            </div>

            <div style={{display:"flex",gap:8}}>
              {[["card","📋 כרטיס"],["all","🗓 כל הקפיצות"]].map(([t,l])=>(
                <button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:"10px 0",background:tab===t?T.tabA:T.tabI,border:`1px solid ${tab===t?T.tabAB:T.tabIB}`,borderRadius:13,color:tab===t?T.tabAC:T.tabIC,fontSize:13,fontWeight:700,cursor:"pointer",transition:"all .15s"}}>{l}</button>
              ))}
            </div>

            {tab==="card"&&<>
              <div onTouchStart={e=>setTs(e.touches[0].clientX)} onTouchEnd={e=>{if(ts===null)return;const d=ts-e.changedTouches[0].clientX;if(Math.abs(d)>44)go(d>0?-1:1);setTs(null);}} onMouseDown={e=>setDs(e.clientX)} onMouseUp={e=>{if(ds===null)return;const d=ds-e.clientX;if(Math.abs(d)>44)go(d>0?-1:1);setDs(null);}} style={{userSelect:"none",cursor:ds?"grabbing":"grab",animation:anim===1?"sl .26s ease":anim===-1?"sr .26s ease":undefined}}>
                <Card weekNum={disp} isPast={disp<cur} isCurrent={disp===cur}/>
              </div>
              <div style={{display:"flex",gap:9,alignItems:"center"}}>
                <button onClick={()=>setOffset(0)} style={{flex:1,padding:12,background:offset===0?T.tabA:T.nav,border:`1px solid ${offset===0?T.tabAB:T.navB}`,borderRadius:13,color:offset===0?T.tabAC:T.text,fontSize:14,fontWeight:800,cursor:"pointer",transition:"all .15s"}}>חזור להיום</button>
                <ShareButton cur={cur} disp={disp}/>
              </div>
              <div style={{textAlign:"center",color:T.muted,fontSize:11}}>← גלוש שמאלה לשבוע הבא · ימינה לשבוע הקודם →</div>
            </>}

            {tab==="all"&&<div style={{background:T.allBg,backdropFilter:"blur(18px)",borderRadius:20,padding:15,border:`1px solid ${T.allB}`,display:"flex",flexDirection:"column",gap:7}}>
              {LEAPS.map(lp=>{
                const end=lp.skillsEnd??lp.restlessEnd;
                const past=cur>end,active=cur>=lp.restlessStart&&cur<=end,away=lp.restlessStart-cur;
                return <div key={lp.leap} onClick={()=>{setOffset(lp.restlessStart-cur);setTab("card");}} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:13,background:active?T.rowA:T.rowI,border:`1px solid ${active?T.rowAB:T.rowIB}`,cursor:"pointer",opacity:past?.43:1,transition:"all .14s"}}>
                  <span style={{fontSize:20}}>{lp.emoji}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:700,color:active?T.tabAC:T.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{lp.isGrey?"":`קפיצה ${lp.leap} · `}{lp.name}</div>
                    <div style={{fontSize:11,color:T.sub}}>שבועות {lp.restlessStart}–{end}{lp.isBig&&<span style={{color:"#f59e0b",marginRight:6}}> ★</span>}</div>
                  </div>
                  <div style={{fontSize:11,padding:"3px 9px",borderRadius:20,flexShrink:0,fontWeight:700,background:past?"rgba(128,128,128,.2)":active?T.tabA:"rgba(128,128,128,.1)",color:past?T.sub:active?T.tabAC:T.sub}}>
                    {past?"✓ עבר":active?"עכשיו":`בעוד ${away}ש׳`}
                  </div>
                </div>;
              })}
            </div>}

            <div style={{background:T.lgBg,borderRadius:15,padding:"11px 14px",border:`1px solid ${T.lgB}`,display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px 14px"}}>
              {Object.entries(CFG).map(([k,v])=><div key={k} style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:14}}>{v.icon}</span><span style={{fontSize:11,color:T.sub}}>{v.label}</span></div>)}
            </div>

            <p style={{color:T.muted,fontSize:11,textAlign:"center",margin:0,lineHeight:1.8}}>
              מבוסס על Wonder Weeks (van de Rijt & Plooij). הקפיצות הן ממוצע – כל תינוק יחיד. בכל ספק רפואי, פנה לרופא ילדים.<br/>
              <span style={{opacity:.7}}>⚠️ לא הכל מדויק — התזמון בפועל יכול להשתנות בשבוע-שבועיים לכל כיוון.</span>
            </p>
          </>)}
        </div>
      </div>;
    }

    const root=ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App/>);
  </script>
</body>
</html>
